<!DOCTYPE html>
<html>

<head>
    <title>Outfit Roast Result</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background 1s;
            background: #f5f5f5;
            position: relative;
        }

        /* Floating words/emoji */
        .floating-word {
            position: absolute;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            white-space: nowrap;
            animation: floatWord 5s linear forwards;
        }

        @keyframes floatWord {
            0% {
                transform: translateY(0px);
                opacity: 1;
            }

            100% {
                transform: translateY(-200px) rotate(10deg);
                opacity: 0;
            }
        }

        /* Card */
        .card {
            background: white;
            padding: 30px 30px;
            width: 420px;
            max-height: 90vh;
            border-radius: 20px;
            text-align: center;
            position: relative;
            z-index: 10;
            border: 4px solid transparent;
            background-clip: padding-box;
            box-shadow: 0 0 20px rgba(255, 100, 100, 0.3);
            overflow-y: auto;
        }

        .card::-webkit-scrollbar {
            width: 8px;
        }

        .card::-webkit-scrollbar-thumb {
            background: #ff4d4d;
            border-radius: 4px;
        }

        .card::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }

        /* 🔴 Red shimmer border */
        .card::before {
            content: "";
            position: absolute;
            top: -4px;
            bottom: -4px;
            left: -4px;
            right: -4px;
            border-radius: 24px;
            background: linear-gradient(270deg, #ff4d4d, #ff9999, #ff4d4d, #ff9999);
            background-size: 400% 400%;
            z-index: -1;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        h2 {
            margin-bottom: 15px;
        }

        img {
            width: 100%;
            border-radius: 12px;
            margin-top: 15px;
            max-height: 200px;
            object-fit: contain;
        }

        .section {
            margin-top: 15px;
            font-weight: bold;
            font-size: 16px;
        }

        .rating {
            color: #ffb400;
            font-size: 20px;
            margin-top: 5px;
        }

        .vibe {
            font-size: 16px;
            margin-top: 5px;
            color: #6c63ff;
        }

        .btn {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn:hover {
            background: #5a54e6;
        }
    </style>
</head>

<body id="body">

    <div class="card">
        <h2>Your Outfit 🔥</h2>
        <img id="uploadedImage" src="">

        <div class="section">You got roasted:</div>
        <div class="roast" id="roastText"></div>

        <div class="section">Rating:</div>
        <div class="rating" id="ratingText"></div>

        <div class="section">Vibe:</div>
        <div class="vibe" id="vibeText"></div>

        <button class="btn" id="nextBtn">Who’s Next? 🔥</button>
    </div>

    <script>
        const body = document.getElementById('body');
        let floatingWords = ['🔥', 'Iconic 👑', 'Viral 📈', 'Bold ⚡', '😈', 'Savage 😈', 'Elite 💎', 'Sharp 🗡️', '🥴', 'Hmm 🤔'];

        function createFloatingWord() {
            const word = document.createElement("div");
            word.className = "floating-word";
            word.innerText = floatingWords[Math.floor(Math.random() * floatingWords.length)];
            word.style.left = Math.random() * window.innerWidth + "px";
            word.style.top = Math.random() * window.innerHeight + "px";
            document.body.appendChild(word);
            setTimeout(() => word.remove(), 5000);
        }

        setInterval(createFloatingWord, 700);

        // Load uploaded image
        const uploadedImage = localStorage.getItem("uploadedImage");
        if (uploadedImage) document.getElementById("uploadedImage").src = uploadedImage;

        // Example roast
        document.getElementById("roastText").innerText = "Bro really said fashion and chose violence 💀";
        document.getElementById("ratingText").innerText = "3/10";
        document.getElementById("vibeText").innerText = "Chaotic 😈";

        document.getElementById("nextBtn").addEventListener("click", () => {
            window.location.href = "login.html";
        });
    </script>

</body>

</html>
